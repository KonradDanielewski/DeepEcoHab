name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ruff check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.17"
      - name: ruff format --check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.17"
          args: "format --check"
