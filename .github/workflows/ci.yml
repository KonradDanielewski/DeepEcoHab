name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ruff check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.17"
      - name: ruff format --check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.17"
          args: "format --check"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Run test suite
        run: uv run --extra test pytest
